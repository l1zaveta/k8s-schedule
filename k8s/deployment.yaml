apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-app
spec:
  replicas: 3         
  selector:
    matchLabels:
      app: my-app
  template:
    metadata:
      labels:
        app: my-app
    spec:
      containers:
      - name: my-app
        image: schedule-app:latest
        imagePullPolicy: Never   
        ports:
        - containerPort: 8000
        resources:
          requests:
            cpu: "100m"          
          limits:
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: my-app-service
spec:
  selector:
    app: my-app
  ports:
  - port: 80
    targetPort: 8000
  type: NodePort
